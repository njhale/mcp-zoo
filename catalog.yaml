# reflect-mcp catalog entries.
#
# Three flavours of the same debug server, useful for verifying obot/nanobot
# wiring across all the MCP runtimes:
#   - npx          (single-user, instance-per-user, stdio transport)
#   - containerized (multi-user, HTTP transport, runs from a GHCR image)
#   - remote       (multi-user, HTTP transport, hosted at reflect.scrat.hale.sh)
#
# The single tool, `reflect`, returns:
#   - process.argv (verifies how nanobot/obot constructs the command line)
#   - process.env  (verifies env-var propagation, including secret bindings)
#   - request headers (HTTP transports only — verifies header propagation,
#                      header secret bindings, prefixing, etc.)

- name: Reflect NPX
  shortDescription: Debug MCP server — npx single-user runtime (stdio)
  description: |
    Reflect MCP server (npx variant). Spawned per user as a stdio child of
    nanobot. The single tool, `reflect`, returns:

      - the command and args this server was launched with (process.argv)
      - the environment variables visible to the process
      - request headers (always null on this variant — stdio has no headers)

    Useful for verifying that env vars configured on the catalog entry — and
    env vars wired via Kubernetes Secret bindings — actually reach the
    spawned npx child.
  metadata:
    categories: Developer Tools
  icon: https://avatars.githubusercontent.com/u/4175918?v=4
  repoURL: https://github.com/njhale/mcp-zoo
  runtime: npx
  npxConfig:
    package: "@njhale/reflect-mcp"
    # The first three args drive the server. Anything after is arbitrary —
    # reflect-mcp passes it through unchanged and surfaces it via
    # `reflect`'s `argv` and `extraArgs` fields, so you can verify exactly
    # how nanobot/obot construct argv for npx-launched servers.
    args:
      - --transport
      - stdio
      - --reflect-tag=npx-single-user
      - hello-from-catalog
  env:
    - key: REFLECT_TEST_VALUE
      name: Reflect Test Value
      description: Plain test env var — round-tripped via the `reflect` tool's `env` field.
      required: false
      sensitive: false
    - key: REFLECT_TEST_SECRET
      name: Reflect Test Secret
      description: Sensitive test env var — verifies sensitive value propagation end-to-end.
      required: false
      sensitive: true
  toolPreview:
    - name: reflect
      description: Returns argv, env, cwd, pid, transport, and (for HTTP) request headers.
      params: {}

- name: Reflect Containerized
  shortDescription: Debug MCP server — containerized runtime (HTTP)
  description: |
    Reflect MCP server (containerized variant). Runs from the prebuilt image
    `ghcr.io/njhale/mcp-zoo/reflect-mcp:main` and serves the streamable HTTP
    transport on port 8099 at `/mcp`. The `reflect` tool returns:

      - the command and args the container was started with
      - the environment variables visible to the process (including k8s
        Secret-projected vars when secret bindings are used)
      - the headers of the inbound HTTP request (the headers nanobot has
        synthesized for the upstream call)

    Useful for verifying full container-runtime wiring: env-var bindings,
    HTTP transport configuration, and header propagation through nanobot.
  metadata:
    categories: Developer Tools
    allow-multiple: "true"
  icon: https://avatars.githubusercontent.com/u/4175918?v=4
  repoURL: https://github.com/njhale/mcp-zoo
  runtime: containerized
  containerizedConfig:
    image: ghcr.io/njhale/mcp-zoo/reflect-mcp:main
    port: 8099
    path: /mcp
    # Real flags first, then arbitrary pass-through args that show up in the
    # `reflect` tool's `argv` / `extraArgs` fields — confirms how nanobot/obot
    # propagate args for containerized runtimes.
    args:
      - --transport
      - http-streamable
      - --port
      - "8099"
      - --path
      - /mcp
      - --reflect-tag=containerized
      - hello-from-catalog
  env:
    - key: REFLECT_TEST_VALUE
      name: Reflect Test Value
      description: Plain test env var — round-tripped via the `reflect` tool's `env` field.
      required: false
      sensitive: false
    - key: REFLECT_TEST_SECRET
      name: Reflect Test Secret
      description: Sensitive test env var — verifies sensitive value propagation end-to-end.
      required: false
      sensitive: true
  toolPreview:
    - name: reflect
      description: Returns argv, env, cwd, pid, transport, and the inbound HTTP request headers.
      params: {}

- name: Reflect Remote
  shortDescription: Debug MCP server — remote runtime (HTTP, hosted) with a Kubernetes-Secret-bound header
  description: |
    Reflect MCP server (remote variant). Points at the hosted instance at
    `https://reflect.hale.sh/mcp`. Nanobot acts as the proxy and forwards
    each MCP request — synthesizing the configured headers — to the
    remote URL. The `reflect` tool returns:

      - the command and args the remote process was launched with
      - the headers nanobot sent to the remote (so you can confirm that
        static headers, user-supplied headers, and headers backed by
        Kubernetes Secret bindings are all propagated correctly)

    Three header code paths are exercised here:

      1. `X-Reflect-Test`     — static value baked into this catalog entry.
      2. `X-Reflect-User`     — user-supplied at install time (sensitive).
      3. `X-Reflect-Token`    — bound to a pre-existing Kubernetes Secret
         via the `secretBinding` field below. Obot never sees the value;
         kubelet projects it onto the nanobot proxy pod's env via
         `valueFrom.secretKeyRef`, and nanobot substitutes it into the
         outbound header at request time using its `${ENV_VAR}` expansion.

    To exercise the binding path, pre-create a Secret in the obot MCP
    deployments namespace before installing this server:

        kubectl -n <mcp-namespace> create secret generic reflect-mcp-creds \
          --from-literal=x_reflect_token='hello-from-the-vault'

    After install, call `reflect` with the reflect key (printed on stderr at
    server startup) and check `headers["x-reflect-token"]` in the response —
    you should see `hello-from-the-vault`. If the Secret/key is missing
    when the pod starts, kubelet fails closed with `CreateContainerConfigError`
    (because the binding is `required: true`), and obot surfaces that as
    `PodStartup=False` on the deployment.
  metadata:
    categories: Developer Tools
    allow-multiple: "true"
  icon: https://avatars.githubusercontent.com/u/4175918?v=4
  repoURL: https://github.com/njhale/mcp-zoo
  runtime: remote
  remoteConfig:
    fixedURL: https://reflect.hale.sh/mcp
    headers:
      - key: X-Reflect-Test
        name: Reflect Test Header (static)
        description: |
          Static header set by the catalog entry. Fixed across all installs.
          Confirms the static-header code path through nanobot.
        value: hello-from-obot
        required: false
        sensitive: false

      - key: X-Reflect-User
        name: Reflect User Header
        description: |
          User-supplied sensitive header. Configure a value at install time
          and `reflect` will return it under `headers["x-reflect-user"]`.
          Confirms the credential-store / envFrom code path.
        required: false
        sensitive: true

      # ──────────────────────────────────────────────────────────────────
      # External-secret integration — see obot-platform/obot#6180.
      #
      # `secretBinding` only validates inside catalogs synced from git
      # (gitManaged=true). The whole-repo PAT-vs-binding path is enforced
      # in obot's mcp validators; UI-created entries cannot introduce
      # bindings.
      #
      # `required: true` matters: with `required: false` and a missing
      # Secret/key, kubelet starts the pod with the env unset, nanobot's
      # `envvar.ReplaceMap` falls through, and the literal string
      # `${X_REFLECT_TOKEN}` ships on the wire as the header value. With
      # `required: true`, kubelet refuses to start the pod and obot's
      # deployment controller surfaces the error.
      # ──────────────────────────────────────────────────────────────────
      - key: X-Reflect-Token
        name: Reflect Token Header (Kubernetes Secret-bound)
        description: |
          Header value bound to a key in a pre-existing Kubernetes Secret in
          the obot MCP deployments namespace. Obot never reads the value —
          it only writes a `valueFrom.secretKeyRef` onto the nanobot proxy
          pod's env, and nanobot substitutes it into this header at request
          time. Verify in `reflect` under `headers["x-reflect-token"]`.
        required: true
        sensitive: true
        secretBinding:
          name: reflect-mcp-creds # pre-existing K8s Secret name
          key: x_reflect_token # key within that Secret
  toolPreview:
    - name: reflect
      description: Returns argv, env, cwd, pid, transport, and the inbound HTTP request headers.
      params: {}
