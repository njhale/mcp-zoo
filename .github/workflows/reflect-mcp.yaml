name: reflect-mcp

# Build a multi-arch (linux/amd64, linux/arm64) image of reflect-mcp and push
# it to GHCR on every push. The tag is the (sanitized) branch name, so a push
# to `main` produces `ghcr.io/njhale/mcp-zoo/reflect-mcp:main`.
on:
  push:
    branches:
      - "**"
    paths:
      - "reflect-mcp/**"
      - ".github/workflows/reflect-mcp.yaml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: njhale/mcp-zoo/reflect-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces a tag like `main`, `feature-foo`, etc., automatically
      # sanitized for Docker (slashes, dots, etc. → `-`).
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./reflect-mcp
          file: ./reflect-mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=reflect-mcp
          cache-to: type=gha,scope=reflect-mcp,mode=max
          provenance: false
